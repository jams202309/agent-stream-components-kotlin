name: Release Android AAR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Maven version to publish, for example 0.1.0-rc.3
        required: true
        type: string
      sdk_ref:
        description: agent-stream-sdk commit SHA, branch, or tag to build
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Resolve release inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION_NAME=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "AGENT_STREAM_SDK_REF=${{ inputs.sdk_ref }}" >> "$GITHUB_ENV"
          else
            echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "AGENT_STREAM_SDK_REF=main" >> "$GITHUB_ENV"
          fi

      - name: Build AAR
        env:
          AGENT_STREAM_SDK_REPO: https://x-access-token:${{ secrets.AGENT_STREAM_SDK_TOKEN || github.token }}@github.com/unseal-network/agent-stream-sdk.git
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./scripts/build-android-aar.sh

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew --no-daemon --no-configuration-cache \
            :agent-stream-android:publishAgentStreamAndroidPublicationToGitHubPackagesRepository \
            -PversionName="$VERSION_NAME" \
            -PagentStreamSdkRef="$AGENT_STREAM_SDK_REF"

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: agent-stream-android-${{ env.VERSION_NAME }}
          path: agent-stream-android/build/outputs/aar/agent-stream-android-release.aar
